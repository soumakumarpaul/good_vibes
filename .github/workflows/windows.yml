name: Build Windows GUI EXE

on:
  push:
    branches: [ development ]
  pull_request:
    branches: [ development ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build GUI App for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # Adjust as needed

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build GUI EXE using PyInstaller
        run: |
          pyinstaller --noconfirm --windowed --onefile --name "GoodVibes" app.py

      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui-exe
          path: dist/main.exe
